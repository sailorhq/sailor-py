name: Publish

# Publishes sailor-py to PyPI when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets required.
# One-time setup on PyPI: add a "pending publisher" for this repo pointing at
# this workflow (.github/workflows/publish.yml) and the "pypi" environment.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build wheel and sdist
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sailor-py
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
